<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}DEFEND ID ACCESS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;900&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#c4c7ca",
                        "on-tertiary-container": "#aeb1b4",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#e0e3e6",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d7e3ff",
                        "surface-tint": "#3c5e97",
                        "on-surface-variant": "#434750",
                        "inverse-on-surface": "#edf0ff",
                        "primary": "#002c5f",
                        "on-primary-fixed": "#001b3e",
                        "on-background": "#141b2c",
                        "outline": "#747781",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ffdad4",
                        "primary-fixed-dim": "#aac7ff",
                        "inverse-primary": "#aac7ff",
                        "surface-variant": "#dbe2f9",
                        "secondary-fixed-dim": "#ffb4a8",
                        "tertiary-container": "#414447",
                        "surface": "#f9f9ff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9ff",
                        "outline-variant": "#c3c6d1",
                        "surface-container-high": "#e0e8ff",
                        "surface-container-highest": "#dbe2f9",
                        "surface-container": "#e9edff",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#21467d",
                        "secondary": "#bc0100",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#293041",
                        "primary-container": "#1d437a",
                        "secondary-container": "#eb0000",
                        "on-secondary-fixed-variant": "#930100",
                        "on-secondary-fixed": "#410000",
                        "on-surface": "#141b2c",
                        "on-secondary-container": "#fffbff",
                        "tertiary": "#2a2e30",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d2daf0",
                        "on-tertiary-fixed": "#191c1e",
                        "surface-container-low": "#f1f3ff",
                        "surface-bright": "#f9f9ff",
                        "on-primary-container": "#90b1ef",
                        "on-tertiary-fixed-variant": "#44474a"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        gutter: "20px",
                        "margin-mobile": "16px",
                        xs: "8px",
                        "margin-desktop": "40px",
                        sm: "12px",
                        lg: "24px",
                        base: "4px",
                        xl: "32px",
                        md: "16px"
                    },
                    fontFamily: {
                        "headline-sm": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "label-md": ["Geist"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "mono-sm": ["Geist"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f3ff; }
        ::-webkit-scrollbar-thumb { background: #c3c6d1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #747781; }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body class="bg-surface text-on-surface">
    {% block body %}{% endblock %}
    
    {% block scripts %}{% endblock %}
</body>
</html>
