<script>
        // Subtle interaction for the "Sign In" button to mimic loading
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', (e) => {
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = `
                <span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>
                Validating Identity...
            `;
            loginBtn.disabled = true;
            
            setTimeout(() => {
                loginBtn.innerHTML = originalContent;
                loginBtn.disabled = false;
            }, 1500);
        });

        // Initialize Material Symbols logic for any dynamic insertions if needed
        document.querySelectorAll('.material-symbols-outlined').forEach(span => {
            if(span.getAttribute('data-icon')) {
                span.textContent = span.getAttribute('data-icon');
            }
        });
    </script>
